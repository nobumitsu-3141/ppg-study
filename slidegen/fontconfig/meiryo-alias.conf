<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Meiryo(メイリオ) を日本語 Noto へ明示的に対応づける。

  これが無いと Linux の fontconfig は Meiryo を解決できず、
  Droid Sans Fallback や Noto Sans CJK SC(簡体字中国語) へ落ちる。
  結果、漢字が中国語字体で描画される（例: 直・骨・今・令 の字形が変わる）。

  置き場所: ~/.config/fontconfig/fonts.conf  または  /etc/fonts/conf.d/99-meiryo.conf
  反映:     fc-cache -f
  確認:     fc-match Meiryo   → "Noto Sans CJK JP" が返れば成功
-->
<fontconfig>
  <match target="pattern">
    <test name="family"><string>Meiryo</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Noto Sans CJK JP</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>メイリオ</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Noto Sans CJK JP</string></edit>
  </match>
  <match target="pattern">
    <test name="family"><string>Meiryo UI</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Noto Sans CJK JP</string></edit>
  </match>
</fontconfig>
